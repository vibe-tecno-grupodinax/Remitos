// ─── Storage: Google Sheets (compartido) con fallback a localStorage ───────────
async function gasGet(action, params = {}) {
    const url = GAS_URL + "?action=" + action + Object.entries(params).map(([k, v]) => `&${k}=${encodeURIComponent(v)}`).join('');
    const r = await fetch(url);
    return r.json();
}
async function gasPost(body) {
    const r = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(body)
    });
    return r.json();
}

// ─── Parser de pedido — formato sistema VIBE TECNO ─────────────────────────
// Formato detectado:
//   KJFEB065    200     COBERTOR DE MOTO 180X120CM
//   HD601        40     SOPORTE TV FIJO DE 14" A 42"
//   (código sin espacios) + (cantidad) + (descripción hasta fin de línea)
// ─────────────────────────────────────────────────────────────────────────────
function parsePedido(text) {
    // Normalizar saltos de línea y artefactos de PDF
    text = text
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .replace(/\f/g, '\n')
        .replace(/\0/g, '');
    const ex = (pats, src) => {
        for (const p of pats) {
            const m = src.match(p);
            if (m)
                return (m[1] || m[2] || '').trim();
        }
        return '';
    };
    // ── Datos del cliente / encabezado ─────────────────────────────────────────
    // ── Extraer cliente, número, nombre y domicilio ────────────────────────────
    const lines = text.split('\n');
    // Número de cliente: etiqueta explícita "Nro Cliente: 10797" o "Nro. Cliente:"
    const nroClienteM = text.match(/nro\.?\s*cliente[:\s]+(\d{3,8})/i)
        || text.match(/n[°º]\s*cliente[:\s]+(\d{3,8})/i);
    const nroCliente = nroClienteM ? nroClienteM[1].trim() : '';
    // Línea "Cliente:" pura (excluye líneas que empiezan con "Nro")
    const clienteLineIdx = lines.findIndex(l => /^\s*cliente[:\s]/i.test(l) && !/^\s*nro/i.test(l));
    const clienteLine = clienteLineIdx >= 0 ? lines[clienteLineIdx] : '';
    // Nombre: de la línea "Cliente:" quitando número si lo precede
    let nombreCliente = '';
    const nomM = clienteLine.match(/cliente[:\s]+\d*\s*([A-ZÁÉÍÓÚÑ\w].+)/i);
    if (nomM) {
        nombreCliente = nomM[1].replace(/^\d+\s*/, '').trim();
    }
    else if (nroClienteM) {
        // Si no hay línea "Cliente:" separada, el nombre puede estar en "Nro Cliente: 10797 NOMBRE"
        const afterNro = text.match(/nro\.?\s*cliente[:\s]+\d+\s+([A-ZÁÉÍÓÚÑ].+)/i);
        if (afterNro)
            nombreCliente = afterNro[1].trim();
    }
    // Domicilio: línea siguiente a "Cliente:" (siempre está ahí, sin etiqueta)
    const refIdx = clienteLineIdx >= 0 ? clienteLineIdx
        : lines.findIndex(l => /^\s*nro\.?\s*cliente/i.test(l));
    const rawDom = refIdx >= 0 ? (lines[refIdx + 1] || '').trim() : '';
    const domicilio = rawDom && !/^(ciudad|provincia|cp|nro|cliente)/i.test(rawDom)
        ? rawDom : '';
    const cliente = {
        nroCliente,
        nombre: nombreCliente,
        domicilio,
        ciudad: ex([/ciudad[:\s]+(.+)/i, /localidad[:\s]+(.+)/i], text),
        provincia: ex([/provincia[:\s]+(.+)/i], text),
        cp: ex([/c\.?p\.?[:\s]+(\d+)/i, /cod\.?\s*postal[:\s]+(\d+)/i], text),
        pedidoNum: (() => {
            // Formato exacto del sistema: A-0000-00052496 o X 0001-0000225831
            const fmt1 = text.match(/\b([A-Z]-\d{4}-\d{6,})\b/);
            if (fmt1)
                return fmt1[1];
            const fmt2 = text.match(/\b([A-Z]\s+\d{4}-\d{6,})\b/);
            if (fmt2)
                return fmt2[1].replace(/\s+/, ' ');
            // Fallbacks genéricos
            return ex([
                /pedido\s*#?[:\s]*([\w\-\/]+)/i,
                /comprobante[:\s]*([\w\-\/]+)/i,
                /orden[:\s]*([\w\-\/]+)/i,
                /n[°oº]?\s*pedido[:\s]*([\w\-\/]+)/i,
            ], text);
        })(),
    };
    // ── Líneas de mercadería ────────────────────────────────────────────────────
    // Patrón PRINCIPAL — el que usa el sistema de VIBE TECNO:
    //   CÓDIGO(sin espacios)  CANTIDAD(número)  DESCRIPCIÓN(texto libre)
    // Los campos están separados por 2+ espacios (columnas de PDF/txt)
    const lineas = [];
    const PATRON_PRINCIPAL = /^([A-Z0-9][A-Z0-9\-\.]{0,30})\s{2,}(\d+(?:[.,]\d+)?)\s{2,}(.+?)\s*$/gim;
    let m;

        const codigo = m[1].trim();

        const descripcion = m[3].replace(/\s{2,}/g, ' ').trim();

        if (/^codigo$/i.test(codigo) || /^cantidad$/i.test(cantidad))
